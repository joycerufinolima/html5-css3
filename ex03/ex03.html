<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens</title>
    <style>
        img{
            width: 200px;
        }
    </style>
</head>
<body>
    <h1>Aprendendo a colocar imagens</h1>
    <p>Abaixo você vai ver uma imagem que está na mesma pasta.</p>
    <img src="logo-html.png" alt="Logo HTML5">
    <p>Abaixo você vai ver uma imagem que está em uma subpasta.</p>
    <img src="imagens/logo-css.png" alt="Logo CSS3">
    <p>Abaixo você verá uma imagem externa.</p>
    <img src="https://img.icons8.com/color/1200/javascript--v1.jpg" alt="Logo JAVASCRIPT">

    <hr>

    <h1>Meu Hobby favorito</h1>
    <img src="imagens/hobby.jpg" alt="Programar">
    <p>Eu gosto desse hobby porque ele me diverte e me ajuda a aprender coisas novas.</p>

    <h2>Meu outro Hobby</h2>
    <img src="imagens/filme.jpg" alt="Assistir Filmes">
    
</body>
</html>
